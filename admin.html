<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHX Prototype</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            /* Renk paleti PHX Pyro Fuel Turuncu ve Mavisi ile güncellendi */
            --bg-overlay: rgba(10, 10, 15, 0.9); 
            --panel-bg: rgba(20, 20, 30, 0.75); 
            --glass-border: rgba(255, 107, 0, 0.3); 
            --primary-orange: #FF6B00; /* PHX Turuncusu */
            --accent-blue: #00BFFF;    /* PHX Mavisi */
            --text-main: #f0f0f0;
            --text-dim: #b0b0b0;
            --error-red: #ff3333;
            --glow: 0 0 15px rgba(255, 107, 0, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: url('images/asa.gif') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }

        .bg-dimmer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        .corner-img {
            position: absolute;
            top: 20px;
            width: 120px;
            height: auto;
            z-index: 10;
            filter: drop-shadow(0 0 8px var(--primary-orange));
        }
        .top-left { left: 30px; }
        .top-right { right: 30px; }

        /* --- Screens --- */
        .screen-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            z-index: 1000;
        }

        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            max-width: 450px;
            width: 90%;
        }

        h1, h2 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        h1 { color: var(--primary-orange); font-size: 24px; margin-bottom: 5px; text-shadow: var(--glow); }
        .subtitle { color: var(--accent-blue); font-size: 12px; margin-bottom: 25px; font-weight: 500; }

        /* --- UI Elements --- */
        .input-group { margin-bottom: 20px; }
        input[type="password"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--primary-orange);
            border-radius: 5px;
            color: var(--primary-orange);
            padding: 12px;
            font-size: 18px;
            text-align: center;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }
        input[type="password"]:focus { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(0, 191, 255, 0.3); }

        .btn-action {
            background: linear-gradient(45deg, var(--primary-orange), #e65c00);
            color: white;
            border: none;
            padding: 12px 40px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
        }
        .btn-action:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 107, 0, 0.5); }

        #login-error { color: var(--error-red); font-size: 13px; margin-top: 15px; height: 18px; font-weight: bold; }

        /* --- Main App UI --- */
        #main-app {
            display: none;
            flex-direction: column;
            height: 100vh;
            padding: 40px 60px;
            box-sizing: border-box;
            position: relative;
        }

        .app-header { text-align: center; margin-bottom: 30px; }
        .app-header h1 { font-size: 42px; margin: 0; }
        .app-header .line { height: 2px; background: linear-gradient(90deg, transparent, var(--primary-orange), var(--accent-blue), transparent); margin: 15px 0; }

        .dashboard {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #idle-view { text-align: center; animation: pulse 3s infinite; }
        .hex-icon { font-size: 120px; color: var(--primary-orange); opacity: 0.4; margin-bottom: 20px; }
        .idle-text { font-size: 22px; color: var(--text-dim); }

        #pres-view {
            display: none;
            width: 100%;
            max-width: 1200px;
            background: rgba(15, 15, 20, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            animation: fadeIn 0.5s ease-out;
        }

        .comp-header { display: flex; align-items: center; gap: 30px; margin-bottom: 25px; }
        .comp-icon { font-size: 80px; }
        .comp-titles { flex: 1; }
        .comp-titles h2 { font-size: 48px; margin: 0; color: #fff; }
        .comp-titles p { font-size: 18px; color: var(--accent-blue); margin-top: 5px; }

        .comp-body { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .spec-list { background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 10px; }
        .spec-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 107, 0, 0.1);
            font-size: 14px;
        }
        .spec-label { color: var(--text-dim); font-weight: bold; }
        .spec-value { color: #fff; }

        .detail-box { line-height: 1.6; font-size: 15px; }
        .sdg-tag {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
            text-align: center;
            font-style: italic;
            color: var(--primary-orange);
        }

        #status-bar {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: var(--accent-blue);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-dimmer"></div>

                    <div class="comp-titles">

                </div>
                
                <div class="comp-body">
                    <div class="spec-list">

<script>

class InfinityComms {
    constructor(device) {
        this.device = device;
        this.messageNumber = 0;
        this.pendingRequests = new Map();
        
        this.device.oninputreport = (event) => {
            const data = new Uint8Array(event.data.buffer);
            const msgId = data[2];
            if (this.pendingRequests.has(msgId)) {
                this.pendingRequests.get(msgId)(data);
                this.pendingRequests.delete(msgId);
            }
            if (data[0] === 0xab && window.app) {
                window.app.handleBaseEvent(data);
            }
        };
    }

    nextId() {
        this.messageNumber = (this.messageNumber + 1) % 256;
        return this.messageNumber;
    }

    async sendRecv(command, data = [], timeout = 1000) {
        const msgId = this.nextId();
        const body = [command, msgId, ...data];
        const packet = new Uint8Array(32);
        packet[0] = 0xff; packet[1] = body.length;
        for (let i = 0; i < body.length; i++) packet[i + 2] = body[i];
        
        let checksum = 0;
        for (let i = 0; i < body.length + 2; i++) checksum = (checksum + packet[i]) & 0xff;
        packet[body.length + 2] = checksum;

        return new Promise((resolve) => {
            const timer = setTimeout(() => {
                this.pendingRequests.delete(msgId);
                resolve(null);
            }, timeout);

            this.pendingRequests.set(msgId, (response) => {
                clearTimeout(timer);
                resolve(Array.from(response));
            });

            this.device.sendReport(0x00, packet);
        });
    }

    sendOnly(command, data = []) {
        const msgId = this.nextId();
        const body = [command, msgId, ...data];
        const packet = new Uint8Array(32);
        packet[0] = 0xff; packet[1] = body.length;
        for (let i = 0; i < body.length; i++) packet[i + 2] = body[i];
        
        let checksum = 0;
        for (let i = 0; i < body.length + 2; i++) checksum = (checksum + packet[i]) & 0xff;
        packet[body.length + 2] = checksum;

        this.device.sendReport(0x00, packet);
    }
}

function deriveKey(uid) {
    const sha1Calc = new Uint8Array(38);
    sha1Calc.set(SHA1_CONSTANT.slice(0, 31), 0);
    sha1Calc.set(uid.slice(0, 7), 31);
    const words = CryptoJS.lib.WordArray.create(sha1Calc);
    const sha1OutWords = CryptoJS.SHA1(words);
    const sha1Out = wordToByteArray(sha1OutWords);
    const key = new Uint8Array(16);
    for (let i = 0; i < 4; i++) {
        for (let x = 0; x < 4; x++) {
            key[x + (i * 4)] = sha1Out[(3 - x) + (i * 4)];
        }
    }
    return key;
}

function wordToByteArray(wordArray) {
    const bytes = [];
    for (let i = 0; i < wordArray.sigBytes; i++) {
        bytes.push((wordArray.words[i >>> 2] >>> (24 - (i % 4) * 8)) & 0xff);
    }
    return bytes;
}

async function readFigureId(comms, order) {
    try {
        const resp = await comms.sendRecv(0xB4, [order]);
        if (!resp) return null;
        const uid = resp.slice(4, 11);
        const key = deriveKey(uid);
        const resp2 = await comms.sendRecv(0xA2, [order, 0x00, 0x01]);
        if (!resp2) return null;
        const blockData = resp2.slice(4, 20);
        const keyWA = CryptoJS.lib.WordArray.create(key);
        const cipherTextWA = CryptoJS.lib.WordArray.create(new Uint8Array(blockData));
        const decrypted = CryptoJS.AES.decrypt({ ciphertext: cipherTextWA }, keyWA, { mode: CryptoJS.mode.ECB, padding: CryptoJS.pad.NoPadding });
        const dec = wordToByteArray(decrypted);
        return (dec[1] << 16) | (dec[2] << 8) | dec[3];
    } catch (e) { return null; }
}

class LightController {
    constructor(comms) {
        this.comms = comms;
        this.currentRgb = ORANGE_RGB;
        this.interval = null;
        this.start();
    }
    setColor(rgb) { this.currentRgb = rgb; }
    start() {
        this.interval = setInterval(() => {
            const [r, g, b] = this.currentRgb;
            try {
                this.comms.sendOnly(0x92, [2, 0x17, 0x02, r, g, b]);
                this.comms.sendOnly(0x92, [3, 0x17, 0x02, r, g, b]);
            } catch (e) {}
        }, 2000);
    }
}

class PyroApp {
    constructor(device) {
        this.comms = new InfinityComms(device);
        this.lightCtrl = null;
        this.initBase();
    }

    async initBase() {
        try {
            await this.comms.sendRecv(0x80, [0x28, 0x63, 0x29, 0x20, 0x44, 0x69, 0x73, 0x6e, 0x65, 0x79, 0x20, 0x32, 0x30, 0x31, 0x33]);
            this.lightCtrl = new LightController(this.comms);
            this.setStatus("System is working ✓ — Waiting for figure");
        } catch (e) { this.setStatus("Connection Error!"); }
    }

    async handleBaseEvent(fields) {
        const position = fields[2];
        const order = fields[4];
        const action = fields[5];
        if (position !== 3) return;

        if (action === 0x00) {
            this.setStatus("NFC TARANIYOR...");
            const figId = await readFigureId(this.comms, order);
            if (figId && COMPONENTS[figId]) {
                if (this.lightCtrl) this.lightCtrl.setColor(COMPONENTS[figId].rgb);
                this.showComponent(figId);
                this.setStatus(`Figure Found: ${COMPONENTS[figId].name}`);
            }
        } else {
            if (this.lightCtrl) this.lightCtrl.setColor(ORANGE_RGB);
            this.showIdle();
            this.setStatus("Connection Active — Waiting for Figure");
        }
    }

    showIdle() {
        document.getElementById('pres-view').style.display = 'none';
        document.getElementById('idle-view').style.display = 'block';
    }

    showComponent(figId) {
        const comp = COMPONENTS[figId];
        document.getElementById('p-icon').innerText = comp.icon;
        document.getElementById('p-icon').style.color = comp.color;
        document.getElementById('p-name').innerText = comp.name;
        document.getElementById('p-subtitle').innerText = comp.subtitle;
        document.getElementById('p-desc').innerText = comp.desc;
        document.getElementById('p-sdg').innerText = "🌍 " + comp.sdg;
        document.getElementById('p-detail').innerText = comp.detail;

        const specsContainer = document.getElementById('p-specs');
        specsContainer.innerHTML = "";
        comp.specs.forEach(([key, val]) => {
            const row = document.createElement('div');
            row.className = 'spec-item';
            row.innerHTML = `<span class="spec-label">${key}</span><span class="spec-value">${val}</span>`;
            specsContainer.appendChild(row);
        });

        document.getElementById('idle-view').style.display = 'none';
        document.getElementById('pres-view').style.display = 'block';
    }

    setStatus(msg) { document.getElementById('status-bar').innerText = msg; }
}

function checkLogin() {
    const input = document.getElementById('password-input').value;
    if (input === ADMIN_PASSWORD) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('hid-overlay').style.display = 'flex';
    } else {
        document.getElementById('login-error').innerText = "⚠ Access Denied";
        document.getElementById('password-input').value = "";
    }
}

async function initHID() {
    try {
        const devices = await navigator.hid.requestDevice({ filters: [{ vendorId: 0x0e6f, productId: 0x0129 }] });
        if (devices.length > 0) {
            const device = devices[0];
            await device.open();
            document.getElementById('hid-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            window.app = new PyroApp(device);
        }
    } catch (e) { alert("Connection Error: " + e.message); }
}

// ENTER tuşu kontrolü - login ekranı için
document.getElementById('password-input').addEventListener('keypress', (e) => { 
    if (e.key === 'Enter') checkLogin(); 
});
</script>
