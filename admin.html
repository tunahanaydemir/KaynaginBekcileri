class InfinityComms {
    constructor(device) {
        this.device = device;
        this.messageNumber = 0;
        this.pendingRequests = new Map();
        
        this.device.oninputreport = (event) => {
            const data = new Uint8Array(event.data.buffer);
            const msgId = data[2];
            if (this.pendingRequests.has(msgId)) {
                this.pendingRequests.get(msgId)(data);
                this.pendingRequests.delete(msgId);
            }
            if (data[0] === 0xab && window.app) {
                window.app.handleBaseEvent(data);
            }
        };
    }

    nextId() {
        this.messageNumber = (this.messageNumber + 1) % 256;
        return this.messageNumber;
    }

    async sendRecv(command, data = [], timeout = 1000) {
        const msgId = this.nextId();
        const body = [command, msgId, ...data];
        const packet = new Uint8Array(32);
        packet[0] = 0xff; packet[1] = body.length;
        for (let i = 0; i < body.length; i++) packet[i + 2] = body[i];
        
        let checksum = 0;
        for (let i = 0; i < body.length + 2; i++) checksum = (checksum + packet[i]) & 0xff;
        packet[body.length + 2] = checksum;

        return new Promise((resolve) => {
            const timer = setTimeout(() => {
                this.pendingRequests.delete(msgId);
                resolve(null);
            }, timeout);

            this.pendingRequests.set(msgId, (response) => {
                clearTimeout(timer);
                resolve(Array.from(response));
            });

            this.device.sendReport(0x00, packet);
        });
    }

    sendOnly(command, data = []) {
        const msgId = this.nextId();
        const body = [command, msgId, ...data];
        const packet = new Uint8Array(32);
        packet[0] = 0xff; packet[1] = body.length;
        for (let i = 0; i < body.length; i++) packet[i + 2] = body[i];
        
        let checksum = 0;
        for (let i = 0; i < body.length + 2; i++) checksum = (checksum + packet[i]) & 0xff;
        packet[body.length + 2] = checksum;

        this.device.sendReport(0x00, packet);
    }
}

function deriveKey(uid) {
    const sha1Calc = new Uint8Array(38);
    sha1Calc.set(SHA1_CONSTANT.slice(0, 31), 0);
    sha1Calc.set(uid.slice(0, 7), 31);
    const words = CryptoJS.lib.WordArray.create(sha1Calc);
    const sha1OutWords = CryptoJS.SHA1(words);
    const sha1Out = wordToByteArray(sha1OutWords);
    const key = new Uint8Array(16);
    for (let i = 0; i < 4; i++) {
        for (let x = 0; x < 4; x++) {
            key[x + (i * 4)] = sha1Out[(3 - x) + (i * 4)];
        }
    }
    return key;
}

function wordToByteArray(wordArray) {
    const bytes = [];
    for (let i = 0; i < wordArray.sigBytes; i++) {
        bytes.push((wordArray.words[i >>> 2] >>> (24 - (i % 4) * 8)) & 0xff);
    }
    return bytes;
}

async function readFigureId(comms, order) {
    try {
        const resp = await comms.sendRecv(0xB4, [order]);
        if (!resp) return null;
        const uid = resp.slice(4, 11);
        const key = deriveKey(uid);
        const resp2 = await comms.sendRecv(0xA2, [order, 0x00, 0x01]);
        if (!resp2) return null;
        const blockData = resp2.slice(4, 20);
        const keyWA = CryptoJS.lib.WordArray.create(key);
        const cipherTextWA = CryptoJS.lib.WordArray.create(new Uint8Array(blockData));
        const decrypted = CryptoJS.AES.decrypt({ ciphertext: cipherTextWA }, keyWA, { mode: CryptoJS.mode.ECB, padding: CryptoJS.pad.NoPadding });
        const dec = wordToByteArray(decrypted);
        return (dec[1] << 16) | (dec[2] << 8) | dec[3];
    } catch (e) { return null; }
}

class LightController {
    constructor(comms) {
        this.comms = comms;
        this.currentRgb = ORANGE_RGB;
        this.interval = null;
        this.start();
    }
    setColor(rgb) { this.currentRgb = rgb; }
    start() {
        this.interval = setInterval(() => {
            const [r, g, b] = this.currentRgb;
            try {
                this.comms.sendOnly(0x92, [2, 0x17, 0x02, r, g, b]);
                this.comms.sendOnly(0x92, [3, 0x17, 0x02, r, g, b]);
            } catch (e) {}
        }, 2000);
    }
}

class PyroApp {
    constructor(device) {
        this.comms = new InfinityComms(device);
        this.lightCtrl = null;
        this.initBase();
    }

    async initBase() {
        try {
            await this.comms.sendRecv(0x80, [0x28, 0x63, 0x29, 0x20, 0x44, 0x69, 0x73, 0x6e, 0x65, 0x79, 0x20, 0x32, 0x30, 0x31, 0x33]);
            this.lightCtrl = new LightController(this.comms);
            this.setStatus("System is working ✓ — Waiting for figure");
        } catch (e) { this.setStatus("Connection Error!"); }
    }

    async handleBaseEvent(fields) {
        const position = fields[2];
        const order = fields[4];
        const action = fields[5];
        if (position !== 3) return;

        if (action === 0x00) {
            this.setStatus("Scanning...");
            const figId = await readFigureId(this.comms, order);
            if (figId && COMPONENTS[figId]) {
                if (this.lightCtrl) this.lightCtrl.setColor(COMPONENTS[figId].rgb);
                this.showComponent(figId);
                this.setStatus(`Figure Found: ${COMPONENTS[figId].name}`);
            }
        } else {
            if (this.lightCtrl) this.lightCtrl.setColor(ORANGE_RGB);
            this.showIdle();
            this.setStatus("Connection Active — Waiting for Figure");
        }
    }

    showIdle() {
        document.getElementById('pres-view').style.display = 'none';
        document.getElementById('idle-view').style.display = 'block';
    }

    showComponent(figId) {
        const comp = COMPONENTS[figId];
        document.getElementById('p-icon').innerText = comp.icon;
        document.getElementById('p-icon').style.color = comp.color;
        document.getElementById('p-name').innerText = comp.name;
        document.getElementById('p-subtitle').innerText = comp.subtitle;
        document.getElementById('p-desc').innerText = comp.desc;
        document.getElementById('p-sdg').innerText = "🌍 " + comp.sdg;
        document.getElementById('p-detail').innerText = comp.detail;

        const specsContainer = document.getElementById('p-specs');
        specsContainer.innerHTML = "";
        comp.specs.forEach(([key, val]) => {
            const row = document.createElement('div');
            row.className = 'spec-item';
            row.innerHTML = `<span class="spec-label">${key}</span><span class="spec-value">${val}</span>`;
            specsContainer.appendChild(row);
        });

        document.getElementById('idle-view').style.display = 'none';
        document.getElementById('pres-view').style.display = 'block';
    }

    setStatus(msg) { document.getElementById('status-bar').innerText = msg; }
}

function checkLogin() {
    const input = document.getElementById('password-input').value;
    if (input === ADMIN_PASSWORD) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('hid-overlay').style.display = 'flex';
    } else {
        document.getElementById('login-error').innerText = "⚠ Access Denied";
        document.getElementById('password-input').value = "";
    }
}

async function initHID() {
    try {
        const devices = await navigator.hid.requestDevice({ filters: [{ vendorId: 0x0e6f, productId: 0x0129 }] });
        if (devices.length > 0) {
            const device = devices[0];
            await device.open();
            document.getElementById('hid-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            window.app = new PyroApp(device);
        }
    } catch (e) { alert("Connection Error: " + e.message); }
}

document.getElementById('password-input').addEventListener('keypress', (e) => { 
    if (e.key === 'Enter') checkLogin(); 
});
</script>
