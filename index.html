<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaynağın Bekçileri | Maintenance</title>
    <style>
        /* Sayfayı tam ortalamak ve modern bir koyu tema için CSS */
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* Koyu modern arka plan */
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .maintenance-container {
            padding: 20px;
            max-width: 500px;
        }

        /* Logo Ayarları */
        .logo {
            max-width: 180px;
            height: auto;
            margin-bottom: 30px;
            display: inline-block;
        }

        /* Dönen Çark (Dişli) CSS Efekti */
        .gear-container {
            margin: 20px auto;
            width: 50px;
            height: 50px;
        }

        .gear {
            width: 100%;
            height: 100%;
            fill: #38bdf8; /* Çarkın mavi rengi */
            animation: spin 3s linear infinite; /* Sürekli dönme efekti */
        }

        /* Dönme Animasyonu */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* İngilizce Bakım Metni */
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 20px 0 10px 0;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        /* Proje İsmi (En alttaki yazı) */
        .project-title {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-top: 1px solid #1e293b;
            padding-top: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        
        <!-- Belirttiğin Klasördeki Logo -->
        <img src="images/gsbllogo.png" alt="GSBL Logo" class="logo">

        <!-- Dönen Çark İkonu (SVG ile harici dosya yüklemeden direkt çalışır) -->
        <div class="gear-container">
            <svg class="gear" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l-.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
            </svg>
        </div>

        <!-- İngilizce Bakım Duyurusu -->
        <h1>Under Maintenance</h1>
        <p>We are currently working on some improvements. We will be back online shortly.</p>

        <!-- En Alttaki Proje İsmi -->
        <div class="project-title">Kaynağın Bekçileri</div>

    </div>

</body>
</html>
